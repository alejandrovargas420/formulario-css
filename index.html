<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario de Registro</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#000000,#434343);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin: 0;
}

.formulario{
background:#1e2a38;
padding:30px;
border-radius:10px;
width:380px;
box-shadow:0px 10px 30px rgba(0,0,0,0.4);
color:white;
}

h2{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:2px solid #00bfff;
border-radius:5px;
background:#2c3e50;
color:white;
box-sizing: border-box; /* Esto evita que los inputs se salgan del cuadro */
}

input:focus,select:focus{
outline:none;
border-color:#00c6ff;
}

.botones{
display:flex;
justify-content:space-between;
margin-top:15px;
}

button{
width:48%;
padding:10px;
border:none;
border-radius:5px;
background:#00bfff;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b3ed6;
}

a{
color:#4ea3ff;
text-decoration: none;
}

a:hover{
text-decoration: underline;
}

/* Estilo especial para que el botón de la hoja de vida resalte */
.enlace-hoja {
display: block;
text-align: center;
margin: 15px 0;
font-weight: bold;
font-size: 16px;
color: #00bfff;
}

</style>
</head>

<body>

<form class="formulario">

<h2>Formulario de registro</h2>

<select required>
<option value="">Seleccione su tipo de documento</option>
<option>CC</option>
<option>TI</option>
<option>CE</option>
</select>

<input type="text" placeholder="Ingrese su número de documento"
pattern="[0-9]{6,12}" required
title="Solo números entre 6 y 12 dígitos">

<input type="text" placeholder="Ingrese su nombre"
pattern="[A-Za-z]{3,64}" required
title="Entre 3 y 64 letras">

<input type="text" placeholder="Ingrese su apellido"
pattern="[A-Za-z]{3,64}" required
title="Entre 3 y 64 letras">

<input type="text" placeholder="Ingrese su dirección" required>

<input type="tel" placeholder="Ingrese su teléfono fijo"
pattern="[0-9]{7}" required
title="Debe tener 7 números">

<input type="tel" placeholder="Ingrese su teléfono celular"
pattern="[0-9]{10}" required
title="Debe tener 10 números">

<input type="email" placeholder="Ingrese su correo"
pattern="[A-Za-z0-9._-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}"
required>

<input type="text" placeholder="Ingrese su usuario"
pattern="[A-Za-z]{3,14}[0-9]{0,2}"
title="Entre 3 y 16 caracteres, letras y hasta 2 números al final"
required>

<input type="password"
placeholder="Ingrese su contraseña"
pattern="(?=.*[A-Z])(?=(?:.*[a-z]){2,})(?=(?:.*[0-9]){5,})[A-Za-z0-9!?\-+/&$]{16}"
title="16 caracteres con: 1 mayúscula, 2 minúsculas, 5 números y símbolos !?-+/&$"
required>

<input type="date"
min="2026-02-15"
max="2026-03-06"
required>

<input type="text" placeholder="Ingrese su hobbie">

<p>
<input type="checkbox" required> 
Estoy de acuerdo con <a href="#">términos y condiciones</a>
</p>

<a href="hojadevida.html" class="enlace-hoja">📄 Ver mi Hoja de Vida</a>

<div class="botones">
<button type="submit">Registrar</button>
<button type="reset">Limpiar</button>
</div>

</form>

</body>
</html>
